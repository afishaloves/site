<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">
<span>A</span>
AFISHA-LOVES
</div>

</header>

<div class="steps">

<div class="step active">
1. Seats
</div>

<div class="step">
2. Reservation
</div>

<div class="step">
3. Ticket
</div>

</div>

<div class="booking-container">

<div class="left">

<div class="movie-header">

<img id="moviePoster" src="">

<div>

<h5>
MOVIE
</h5>

<h2 id="movieTitle">
Movie Title
</h2>

<div class="movie-details">

<div>

<span>
DATE
</span>

<strong id="selectedDate">
26 MAY
</strong>

<div class="date-list">

<div class="date active-date">
26 MAY
</div>

<div class="date">
27 MAY
</div>

<div class="date">
28 MAY
</div>

<div class="date">
29 MAY
</div>

</div>

</div>

<div>

<span>
TIME
</span>

<strong id="selectedTime">
18:00
</strong>

</div>

<div>

<span>
CITY
</span>

<strong id="selectedCity">
City
</strong>

</div>

<div>

<span>
CINEMA
</span>

<strong id="selectedCinema">
Cinema
</strong>

</div>

<div>

<span>
ADDRESS
</span>

<strong id="selectedCinemaAddress">
Address
</strong>

</div>

</div>

</div>

</div>

<div class="cinema">

<div class="screen">
SCREEN
</div>

<div id="rows"></div>

</div>

</div>

<div class="right">

<h2>
Your Order
</h2>

<div class="order-line">

<span>
Tickets
</span>

<strong id="ticketCount">
0
</strong>

</div>

<div class="order-line">

<span>
Total
</span>

<strong id="totalPrice">
$0
</strong>

</div>

<button id="continueBtn">
Continue
</button>

</div>

</div>

<div
class="payment-page"
id="paymentPage"
style="display:none;"
>

<div class="payment-box">

<h2>
Reservation
</h2>

<div id="step1">

<input
id="firstName"
type="text"
placeholder="First Name"
>

<input
id="phone"
type="text"
placeholder="Phone Number"
>

<button id="nextStepBtn">
Next
</button>

</div>

<div
id="step2"
style="display:none;"
>

<input
id="lastName"
type="text"
placeholder="Last Name"
>

<button id="completeBtn">
Complete Reservation
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
